stages:
  - validate
  - test
  - report

variables:
  NODE_VERSION: "20"
  PLAYWRIGHT_BROWSERS_PATH: "0"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

install:
  stage: validate
  image: node:${NODE_VERSION}-bookworm
  script:
    - npm ci --cache .npm --prefer-offline
    - npx playwright install --with-deps chromium
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

api-tests:
  stage: test
  image: node:${NODE_VERSION}-bookworm
  needs:
    - install
  script:
    - npm run test:api -- --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

ui-tests:
  stage: test
  image: node:${NODE_VERSION}-bookworm
  needs:
    - install
  script:
    - npm run test:ui -- --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

quality-summary:
  stage: report
  image: node:${NODE_VERSION}-bookworm
  needs:
    - api-tests
    - ui-tests
  script:
    - node utils/test-data-builder.js || true
    - echo "QA Learning Lab pipeline finished"
