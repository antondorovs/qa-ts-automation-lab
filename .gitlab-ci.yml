stages:
  - validate
  - test
  - diagnostics

default:
  image: node:24-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

variables:
  CI: "true"

typecheck-and-utils:
  stage: validate
  script:
    - npm run typecheck
    - npm run test:utils -- --project=chromium
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

api-tests:
  stage: test
  script:
    - npm run test:api -- --project=chromium
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

ui-tests:
  stage: test
  script:
    - npx playwright install --with-deps chromium
    - npm run test:ui -- --project=chromium
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

live-api:
  stage: diagnostics
  when: manual
  allow_failure: true
  variables:
    RUN_LIVE_API_TESTS: "true"
    BASE_URL: "https://reqres.in"
    API_EMAIL: "eve.holt@reqres.in"
    API_PASSWORD: "cityslicka"
  script:
    - npm run test:live -- --project=chromium
