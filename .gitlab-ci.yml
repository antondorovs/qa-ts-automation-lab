stages:
  - validate
  - test
  - report

variables:
  NODE_VERSION: "20"
  BASE_URL: "https://reqres.in"
  API_EMAIL: "eve.holt@reqres.in"
  API_PASSWORD: "cityslicka"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

install:
  stage: validate
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  script:
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

api-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  needs:
    - install
  script:
    - npm run test:api -- --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

ui-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  needs:
    - install
  script:
    - npx playwright --version
    - npm run test:ui -- --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

quality-summary:
  stage: report
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  needs:
    - api-tests
    - ui-tests
  script:
    - npx playwright test --list --project=chromium
    - echo "QA TypeScript Automation Lab pipeline finished"
