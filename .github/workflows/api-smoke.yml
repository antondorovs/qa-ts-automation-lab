name: API smoke checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: https://reqres.in
      API_EMAIL: eve.holt@reqres.in
      API_PASSWORD: cityslicka

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api -- --project=chromium
